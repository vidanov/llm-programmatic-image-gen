<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Code as Canvas: LLM Programmatic Image Generation">
  <defs>
    <linearGradient id="socBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a07"/>
      <stop offset="100%" stop-color="#0d1f15"/>
    </linearGradient>
    <linearGradient id="socAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#socBg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Title -->
  <text x="640" y="200" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#22c55e" text-anchor="middle" letter-spacing="4" font-weight="700">CODE AS CANVAS</text>
  <text x="640" y="280" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" fill="#e8f5ec" text-anchor="middle" font-weight="800">Your image budget</text>
  <text x="640" y="350" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" fill="url(#socAccent)" text-anchor="middle" font-weight="800">is 100x too high</text>

  <!-- Subtitle -->
  <text x="640" y="420" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#6b8a74" text-anchor="middle">LLMs write rendering code. Existing engines produce the image.</text>
  <text x="640" y="455" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#6b8a74" text-anchor="middle">SVG, Three.js, Blender, Godot, Unreal. $0.0003 per image.</text>

  <!-- Stats row -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" text-anchor="middle">
    <text x="360" y="540" font-size="28" fill="#22c55e" font-weight="700">8 renderers</text>
    <text x="360" y="565" font-size="12" fill="#6b8a74">SVG to Unreal Engine</text>

    <text x="640" y="540" font-size="28" fill="#22c55e" font-weight="700">$0.0003</text>
    <text x="640" y="565" font-size="12" fill="#6b8a74">per image (vs $0.03 diffusion)</text>

    <text x="920" y="540" font-size="28" fill="#22c55e" font-weight="700">100% editable</text>
    <text x="920" y="565" font-size="12" fill="#6b8a74">diff, branch, merge</text>
  </g>

  <!-- Author -->
  <text x="640" y="615" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#4a6b54" text-anchor="middle">Alexey Vidanov · github.com/vidanov/llm-programmatic-image-gen</text>

  <!-- Border -->
  <rect width="1280" height="640" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.15"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Code as Canvas: LLM writes code, renderer produces image">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faf9"/>
      <stop offset="100%" stop-color="#ecf5ef"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#heroBg)" rx="12"/>
  <rect width="900" height="300" fill="none" stroke="#d1e7d9" stroke-width="1.5" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="75" x2="900" y2="75"/><line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="225" x2="900" y2="225"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Left: Title -->
  <text x="50" y="70" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#16a34a" letter-spacing="3" font-weight="700">CODE AS CANVAS</text>
  <text x="50" y="120" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" fill="#1a2e23" font-weight="800">Your image budget</text>
  <text x="50" y="168" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" fill="#16a34a" font-weight="800">is 100x too high</text>

  <!-- Subtitle -->
  <text x="50" y="210" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5a7065">LLMs write rendering code. Existing engines produce the image.</text>
  <text x="50" y="232" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5a7065">SVG, Three.js, Blender, Godot, Unreal. All 100x cheaper than diffusion.</text>

  <!-- Bottom accent line -->
  <rect x="50" y="260" width="80" height="3" fill="url(#accentGrad)" rx="1.5"/>

  <!-- Right: Pipeline diagram -->
  <g transform="translate(520, 55)">
    <!-- Prompt box -->
    <rect x="0" y="30" width="80" height="45" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="40" y="50" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="700">PROMPT</text>
    <text x="40" y="65" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="8" fill="#5a7065" text-anchor="middle">10 words</text>

    <!-- Arrow 1 -->
    <line x1="85" y1="52" x2="110" y2="52" stroke="#16a34a" stroke-width="2"/>
    <polygon points="108,47 116,52 108,57" fill="#16a34a"/>

    <!-- LLM box (green filled) -->
    <rect x="120" y="25" width="90" height="55" rx="6" fill="#16a34a"/>
    <text x="165" y="50" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">LLM</text>
    <text x="165" y="67" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle">~800 tokens</text>

    <!-- Arrow 2 -->
    <line x1="215" y1="52" x2="240" y2="52" stroke="#16a34a" stroke-width="2"/>
    <polygon points="238,47 246,52 238,57" fill="#16a34a"/>

    <!-- Rendered image box -->
    <rect x="250" y="30" width="80" height="45" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <!-- Mini chart inside -->
    <rect x="262" y="40" width="8" height="20" rx="1.5" fill="#16a34a" opacity="0.4"/>
    <rect x="274" y="35" width="8" height="25" rx="1.5" fill="#16a34a" opacity="0.6"/>
    <rect x="286" y="42" width="8" height="18" rx="1.5" fill="#16a34a" opacity="0.5"/>
    <rect x="298" y="38" width="8" height="22" rx="1.5" fill="#16a34a" opacity="0.7"/>
    <rect x="310" y="44" width="8" height="16" rx="1.5" fill="#16a34a" opacity="0.3"/>
    <text x="290" y="70" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="6" fill="#16a34a" text-anchor="middle">IMAGE</text>

    <!-- Cost callout -->
    <rect x="110" y="100" width="120" height="36" rx="6" fill="#e8f5ec" stroke="#d1e7d9" stroke-width="1"/>
    <text x="170" y="118" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="700">$0.0003</text>
    <text x="170" y="130" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="8" fill="#5a7065" text-anchor="middle">per image</text>

    <!-- Labels -->
    <text x="40" y="90" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="7" fill="#5a7065" text-anchor="middle">input</text>
    <text x="165" y="90" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="7" fill="#5a7065" text-anchor="middle">generates code</text>
    <text x="290" y="90" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="7" fill="#5a7065" text-anchor="middle">renders free</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" role="img" aria-label="Code as Canvas: LLM writes rendering code, existing engine produces the image">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a07"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#heroBg)" rx="12"/>
  <rect width="800" height="280" fill="none" stroke="#22c55e" stroke-width="1" rx="12" opacity="0.2"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="70" x2="800" y2="70"/><line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="100" y1="0" x2="100" y2="280"/><line x1="200" y1="0" x2="200" y2="280"/><line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/><line x1="500" y1="0" x2="500" y2="280"/><line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
  </g>

  <!-- Left: Title -->
  <text x="50" y="80" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#22c55e" letter-spacing="3" font-weight="700">CODE AS CANVAS</text>
  <text x="50" y="125" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="#e8f5ec" font-weight="800">Your image budget</text>
  <text x="50" y="170" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="url(#accentGrad)" font-weight="800">is 100x too high</text>

  <!-- Subtitle -->
  <text x="50" y="210" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6b8a74">LLMs write rendering code. Existing engines produce the image.</text>
  <text x="50" y="232" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6b8a74">SVG, Three.js, Blender, Godot, Unreal. All 100x cheaper than diffusion.</text>

  <!-- Right: Mini pipeline diagram -->
  <g transform="translate(520, 60)">
    <!-- Prompt box -->
    <rect x="0" y="30" width="70" height="40" rx="4" fill="#111a15" stroke="#22c55e" stroke-width="1"/>
    <text x="35" y="48" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="8" fill="#22c55e" text-anchor="middle" font-weight="700">PROMPT</text>
    <text x="35" y="62" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="7" fill="#6b8a74" text-anchor="middle">10 words</text>

    <!-- Arrow 1 -->
    <line x1="75" y1="50" x2="95" y2="50" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="93,46 100,50 93,54" fill="#22c55e"/>

    <!-- LLM box -->
    <rect x="105" y="25" width="70" height="50" rx="4" fill="#22c55e"/>
    <text x="140" y="48" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#050a07" text-anchor="middle" font-weight="700">LLM</text>
    <text x="140" y="62" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="7" fill="rgba(0,0,0,0.5)" text-anchor="middle">~800 tokens</text>

    <!-- Arrow 2 -->
    <line x1="180" y1="50" x2="200" y2="50" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="198,46 205,50 198,54" fill="#22c55e"/>

    <!-- Rendered box -->
    <rect x="210" y="30" width="70" height="40" rx="4" fill="#111a15" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="220" y="38" width="18" height="10" rx="2" fill="#22c55e" opacity="0.7"/>
    <rect x="242" y="38" width="28" height="4" rx="1" fill="#4ade80" opacity="0.5"/>
    <rect x="242" y="46" width="20" height="3" rx="1" fill="#6b8a74" opacity="0.3"/>
    <rect x="220" y="54" width="48" height="3" rx="1" fill="#22c55e" opacity="0.2"/>
    <text x="245" y="64" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="6" fill="#22c55e" text-anchor="middle">IMAGE</text>

    <!-- Cost label -->
    <text x="140" y="100" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#22c55e" text-anchor="middle" font-weight="700">$0.0003</text>
    <text x="140" y="116" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#6b8a74" text-anchor="middle">per image</text>

    <!-- Decorative dots -->
    <circle cx="20" cy="120" r="2" fill="#22c55e" opacity="0.3"/>
    <circle cx="80" cy="130" r="1.5" fill="#4ade80" opacity="0.2"/>
    <circle cx="200" cy="115" r="2" fill="#22c55e" opacity="0.25"/>
    <circle cx="260" cy="125" r="1.5" fill="#86efac" opacity="0.2"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="50" y="260" width="100" height="2" fill="url(#accentGrad)" rx="1" opacity="0.6"/>
</svg>

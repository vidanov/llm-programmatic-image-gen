<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="mathBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="mathGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="mathArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#mathBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#6366f1" stroke-width="0.5">
    <line x1="400" y1="40" x2="400" y2="420"/><line x1="60" y1="260" x2="740" y2="260"/>
    <line x1="200" y1="40" x2="200" y2="420"/><line x1="600" y1="40" x2="600" y2="420"/>
    <line x1="60" y1="140" x2="740" y2="140"/><line x1="60" y1="380" x2="740" y2="380"/>
  </g>

  <!-- Axes -->
  <g stroke="#6366f1" stroke-width="1.5" opacity="0.6">
    <line x1="80" y1="260" x2="720" y2="260" marker-end="url(#mathArrow)"/>
    <line x1="400" y1="410" x2="400" y2="60" marker-end="url(#mathArrow)"/>
  </g>

  <!-- Axis labels -->
  <text x="730" y="255" font-family="serif" font-size="14" fill="#a5b4fc" font-style="italic">x</text>
  <text x="405" y="55" font-family="serif" font-size="14" fill="#a5b4fc" font-style="italic">y</text>

  <!-- Tick marks -->
  <g stroke="#6366f1" stroke-width="1" opacity="0.4" font-family="ui-monospace, monospace" font-size="9" fill="#818cf8">
    <line x1="200" y1="255" x2="200" y2="265"/><text x="195" y="278">-π</text>
    <line x1="300" y1="255" x2="300" y2="265"/><text x="290" y="278">-π/2</text>
    <line x1="500" y1="255" x2="500" y2="265"/><text x="493" y="278">π/2</text>
    <line x1="600" y1="255" x2="600" y2="265"/><text x="597" y="278">π</text>
    <line x1="395" y1="160" x2="405" y2="160"/><text x="410" y="164">1</text>
    <line x1="395" y1="360" x2="405" y2="360"/><text x="410" y="364">-1</text>
  </g>

  <!-- Sine wave (main, glowing) -->
  <path d="M80,260 C113,260 130,200 160,160 C190,120 210,100 240,100 C270,100 290,120 320,160 C350,200 367,260 400,260 C433,260 450,320 480,360 C510,400 530,420 560,420 C590,420 610,400 640,360 C670,320 687,260 720,260" 
    fill="none" stroke="#818cf8" stroke-width="3" filter="url(#mathGlow)" opacity="0.3"/>
  <path d="M80,260 C113,260 130,200 160,160 C190,120 210,100 240,100 C270,100 290,120 320,160 C350,200 367,260 400,260 C433,260 450,320 480,360 C510,400 530,420 560,420 C590,420 610,400 640,360 C670,320 687,260 720,260" 
    fill="none" stroke="#a5b4fc" stroke-width="2">
    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="3s" fill="freeze" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray" from="0 1200" to="1200 0" dur="3s" fill="freeze" repeatCount="indefinite"/>
  </path>

  <!-- Cosine wave (secondary) -->
  <path d="M80,160 C113,160 130,200 160,260 C190,320 210,360 240,360 C270,360 290,320 320,260 C350,200 367,160 400,160 C433,160 450,200 480,260 C510,320 530,360 560,360 C590,360 610,320 640,260 C670,200 687,160 720,160" 
    fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.6" stroke-dasharray="6 4"/>

  <!-- Tangent markers (vertical helper lines at key points) -->
  <g stroke="#22c55e" stroke-width="1" opacity="0.3" stroke-dasharray="3 5">
    <line x1="240" y1="100" x2="240" y2="260"/>
    <line x1="560" y1="420" x2="560" y2="260"/>
  </g>

  <!-- Points on curve -->
  <g filter="url(#softGlow)">
    <circle cx="240" cy="100" r="5" fill="#a5b4fc" opacity="0.9">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="260" r="4" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="560" cy="420" r="5" fill="#a5b4fc" opacity="0.9">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Moving point along the curve -->
  <circle r="6" fill="#22c55e" opacity="0.9" filter="url(#softGlow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M80,260 C113,260 130,200 160,160 C190,120 210,100 240,100 C270,100 290,120 320,160 C350,200 367,260 400,260 C433,260 450,320 480,360 C510,400 530,420 560,420 C590,420 610,400 640,360 C670,320 687,260 720,260"/>
  </circle>
  <!-- Trail of the moving point -->
  <circle r="3" fill="#22c55e" opacity="0.4">
    <animateMotion dur="6s" begin="-0.5s" repeatCount="indefinite" path="M80,260 C113,260 130,200 160,160 C190,120 210,100 240,100 C270,100 290,120 320,160 C350,200 367,260 400,260 C433,260 450,320 480,360 C510,400 530,420 560,420 C590,420 610,400 640,360 C670,320 687,260 720,260"/>
  </circle>

  <!-- Area under curve (subtle fill) -->
  <path d="M80,260 C113,260 130,200 160,160 C190,120 210,100 240,100 C270,100 290,120 320,160 C350,200 367,260 400,260 L400,260 L80,260 Z" 
    fill="#a5b4fc" opacity="0.05"/>

  <!-- Formula -->
  <g font-family="serif" fill="#e8e0f0">
    <text x="400" y="455" font-size="22" text-anchor="middle" font-style="italic" opacity="0.9">f(x) = sin(x)</text>
    <text x="400" y="478" font-size="13" text-anchor="middle" font-style="italic" opacity="0.5" fill="#f472b6">g(x) = cos(x)</text>
  </g>

  <!-- Corner info -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#818cf8" opacity="0.5">
    <text x="30" y="480">MANIM-STYLE · ANIMATED SVG</text>
    <text x="30" y="493">~2,000 tokens · $0.001</text>
  </g>
  <g font-family="ui-monospace, monospace" font-size="9" fill="#818cf8" opacity="0.5" text-anchor="end">
    <text x="770" y="480">No video file. No runtime.</text>
    <text x="770" y="493">Pure SVG &lt;animate&gt; elements.</text>
  </g>

  <!-- Decorative frame -->
  <rect x="15" y="15" width="770" height="470" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2" rx="4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="neuralBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <filter id="ng1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="ng2"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="ng3"><feGaussianBlur stdDeviation="6"/></filter>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#neuralBg)"/>

  <!-- Ambient glow -->
  <circle cx="400" cy="250" r="200" fill="#22c55e" opacity="0.02" filter="url(#ng3)"/>
  <circle cx="250" cy="180" r="100" fill="#4ade80" opacity="0.03" filter="url(#ng3)"/>
  <circle cx="580" cy="320" r="120" fill="#059669" opacity="0.02" filter="url(#ng3)"/>

  <!-- Connection lines (neural network style) -->
  <g stroke="#22c55e" fill="none" opacity="0.15" stroke-width="0.8">
    <!-- Layer 1 to Layer 2 -->
    <line x1="120" y1="100" x2="280" y2="80"/>
    <line x1="120" y1="100" x2="280" y2="160"/>
    <line x1="120" y1="100" x2="280" y2="240"/>
    <line x1="120" y1="200" x2="280" y2="80"/>
    <line x1="120" y1="200" x2="280" y2="160"/>
    <line x1="120" y1="200" x2="280" y2="240"/>
    <line x1="120" y1="200" x2="280" y2="320"/>
    <line x1="120" y1="300" x2="280" y2="160"/>
    <line x1="120" y1="300" x2="280" y2="240"/>
    <line x1="120" y1="300" x2="280" y2="320"/>
    <line x1="120" y1="300" x2="280" y2="400"/>
    <line x1="120" y1="400" x2="280" y2="240"/>
    <line x1="120" y1="400" x2="280" y2="320"/>
    <line x1="120" y1="400" x2="280" y2="400"/>
    <!-- Layer 2 to Layer 3 -->
    <line x1="280" y1="80" x2="440" y2="120"/>
    <line x1="280" y1="80" x2="440" y2="200"/>
    <line x1="280" y1="160" x2="440" y2="120"/>
    <line x1="280" y1="160" x2="440" y2="200"/>
    <line x1="280" y1="160" x2="440" y2="280"/>
    <line x1="280" y1="240" x2="440" y2="120"/>
    <line x1="280" y1="240" x2="440" y2="200"/>
    <line x1="280" y1="240" x2="440" y2="280"/>
    <line x1="280" y1="240" x2="440" y2="360"/>
    <line x1="280" y1="320" x2="440" y2="200"/>
    <line x1="280" y1="320" x2="440" y2="280"/>
    <line x1="280" y1="320" x2="440" y2="360"/>
    <line x1="280" y1="400" x2="440" y2="280"/>
    <line x1="280" y1="400" x2="440" y2="360"/>
    <!-- Layer 3 to Layer 4 -->
    <line x1="440" y1="120" x2="600" y2="150"/>
    <line x1="440" y1="120" x2="600" y2="250"/>
    <line x1="440" y1="200" x2="600" y2="150"/>
    <line x1="440" y1="200" x2="600" y2="250"/>
    <line x1="440" y1="200" x2="600" y2="350"/>
    <line x1="440" y1="280" x2="600" y2="150"/>
    <line x1="440" y1="280" x2="600" y2="250"/>
    <line x1="440" y1="280" x2="600" y2="350"/>
    <line x1="440" y1="360" x2="600" y2="250"/>
    <line x1="440" y1="360" x2="600" y2="350"/>
    <!-- Layer 4 to output -->
    <line x1="600" y1="150" x2="720" y2="200"/>
    <line x1="600" y1="150" x2="720" y2="300"/>
    <line x1="600" y1="250" x2="720" y2="200"/>
    <line x1="600" y1="250" x2="720" y2="300"/>
    <line x1="600" y1="350" x2="720" y2="200"/>
    <line x1="600" y1="350" x2="720" y2="300"/>
  </g>

  <!-- Animated pulse along connections -->
  <g>
    <circle r="2" fill="#4ade80" opacity="0.8" filter="url(#ng1)">
      <animateMotion dur="2s" repeatCount="indefinite" path="M120,100 L280,160"/>
    </circle>
    <circle r="2" fill="#22c55e" opacity="0.8" filter="url(#ng1)">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M280,240 L440,280"/>
    </circle>
    <circle r="2" fill="#4ade80" opacity="0.7" filter="url(#ng1)">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M440,200 L600,250"/>
    </circle>
    <circle r="2" fill="#22c55e" opacity="0.8" filter="url(#ng1)">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M600,250 L720,200"/>
    </circle>
    <circle r="1.5" fill="#86efac" opacity="0.6" filter="url(#ng1)">
      <animateMotion dur="3s" begin="0.5s" repeatCount="indefinite" path="M120,300 L280,320"/>
    </circle>
    <circle r="1.5" fill="#34d399" opacity="0.6" filter="url(#ng1)">
      <animateMotion dur="2.8s" begin="1s" repeatCount="indefinite" path="M280,160 L440,120"/>
    </circle>
    <circle r="1.8" fill="#22c55e" opacity="0.7" filter="url(#ng1)">
      <animateMotion dur="2s" begin="0.3s" repeatCount="indefinite" path="M440,360 L600,350"/>
    </circle>
    <circle r="1.5" fill="#4ade80" opacity="0.6" filter="url(#ng1)">
      <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite" path="M600,150 L720,300"/>
    </circle>
  </g>

  <!-- Neurons - Layer 1 (Input) -->
  <g>
    <circle cx="120" cy="100" r="14" fill="#22c55e" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="120" cy="100" r="7" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <circle cx="120" cy="100" r="3" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="120" cy="200" r="14" fill="#22c55e" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="120" cy="200" r="7" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <circle cx="120" cy="200" r="3" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="120" cy="300" r="14" fill="#22c55e" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="120" cy="300" r="7" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <circle cx="120" cy="300" r="3" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="120" cy="400" r="14" fill="#22c55e" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="120" cy="400" r="7" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <circle cx="120" cy="400" r="3" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Neurons - Layer 2 -->
  <g>
    <circle cx="280" cy="80" r="12" fill="#4ade80" opacity="0.08" filter="url(#ng2)"/>
    <circle cx="280" cy="80" r="6" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <circle cx="280" cy="80" r="2.5" fill="#4ade80" opacity="0.8">
      <animate attributeName="r" values="2;3.5;2" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="280" cy="160" r="12" fill="#4ade80" opacity="0.08" filter="url(#ng2)"/>
    <circle cx="280" cy="160" r="6" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <circle cx="280" cy="160" r="2.5" fill="#4ade80" opacity="0.8">
      <animate attributeName="r" values="2.5;3;2.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="280" cy="240" r="15" fill="#4ade80" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="280" cy="240" r="7" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
    <circle cx="280" cy="240" r="3.5" fill="#4ade80" opacity="0.9">
      <animate attributeName="r" values="3;4.5;3" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="280" cy="320" r="12" fill="#4ade80" opacity="0.08" filter="url(#ng2)"/>
    <circle cx="280" cy="320" r="6" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <circle cx="280" cy="320" r="2.5" fill="#4ade80" opacity="0.8"/>

    <circle cx="280" cy="400" r="11" fill="#4ade80" opacity="0.07" filter="url(#ng2)"/>
    <circle cx="280" cy="400" r="5.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <circle cx="280" cy="400" r="2" fill="#4ade80" opacity="0.7"/>
  </g>

  <!-- Neurons - Layer 3 -->
  <g>
    <circle cx="440" cy="120" r="13" fill="#10b981" opacity="0.09" filter="url(#ng2)"/>
    <circle cx="440" cy="120" r="6.5" fill="none" stroke="#10b981" stroke-width="1.3" opacity="0.6"/>
    <circle cx="440" cy="120" r="3" fill="#10b981" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="440" cy="200" r="16" fill="#10b981" opacity="0.12" filter="url(#ng2)"/>
    <circle cx="440" cy="200" r="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <circle cx="440" cy="200" r="4" fill="#10b981" opacity="0.9">
      <animate attributeName="r" values="3.5;5;3.5" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="440" cy="280" r="14" fill="#10b981" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="440" cy="280" r="7" fill="none" stroke="#10b981" stroke-width="1.4" opacity="0.65"/>
    <circle cx="440" cy="280" r="3.2" fill="#10b981" opacity="0.85"/>

    <circle cx="440" cy="360" r="12" fill="#10b981" opacity="0.08" filter="url(#ng2)"/>
    <circle cx="440" cy="360" r="6" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.55"/>
    <circle cx="440" cy="360" r="2.5" fill="#10b981" opacity="0.75"/>
  </g>

  <!-- Neurons - Layer 4 -->
  <g>
    <circle cx="600" cy="150" r="14" fill="#059669" opacity="0.1" filter="url(#ng2)"/>
    <circle cx="600" cy="150" r="7" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.7"/>
    <circle cx="600" cy="150" r="3.5" fill="#059669" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="250" r="18" fill="#059669" opacity="0.12" filter="url(#ng2)"/>
    <circle cx="600" cy="250" r="9" fill="none" stroke="#059669" stroke-width="1.8" opacity="0.75"/>
    <circle cx="600" cy="250" r="4.5" fill="#059669" opacity="0.95">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="350" r="13" fill="#059669" opacity="0.09" filter="url(#ng2)"/>
    <circle cx="600" cy="350" r="6.5" fill="none" stroke="#059669" stroke-width="1.3" opacity="0.65"/>
    <circle cx="600" cy="350" r="3" fill="#059669" opacity="0.85"/>
  </g>

  <!-- Output nodes -->
  <g>
    <circle cx="720" cy="200" r="16" fill="#22c55e" opacity="0.15" filter="url(#ng2)"/>
    <circle cx="720" cy="200" r="10" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="9;12;9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="200" r="5" fill="#22c55e" opacity="1"/>

    <circle cx="720" cy="300" r="16" fill="#22c55e" opacity="0.15" filter="url(#ng2)"/>
    <circle cx="720" cy="300" r="10" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="9;12;9" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="300" r="5" fill="#22c55e" opacity="1"/>
  </g>

  <!-- Layer labels -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#6b8a74" text-anchor="middle" opacity="0.6">
    <text x="120" y="460">Input</text>
    <text x="280" y="460">Hidden 1</text>
    <text x="440" y="460">Hidden 2</text>
    <text x="600" y="460">Hidden 3</text>
    <text x="720" y="460">Output</text>
  </g>

  <!-- Title -->
  <text x="400" y="30" font-family="ui-monospace, monospace" font-size="12" fill="#e8f5ec" text-anchor="middle" letter-spacing="2" opacity="0.8">NEURAL NETWORK VISUALIZATION</text>
  <text x="400" y="485" font-family="ui-monospace, monospace" font-size="9" fill="#6b8a74" text-anchor="middle" letter-spacing="1">4 layers · 16 neurons · 48 connections · Animated signals · ~2,800 tokens · $0.0011</text>
</svg>

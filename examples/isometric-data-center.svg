<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>

  <!-- Floor grid (isometric) -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <!-- Horizontal iso lines -->
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="50" y1="470" x2="750" y2="470"/>
    <line x1="100" y1="490" x2="700" y2="490"/>
    <line x1="150" y1="510" x2="650" y2="510"/>
    <line x1="200" y1="530" x2="600" y2="530"/>
    <line x1="250" y1="550" x2="550" y2="550"/>
    <!-- Vertical iso lines -->
    <line x1="400" y1="350" x2="400" y2="580"/>
    <line x1="300" y1="380" x2="300" y2="560"/>
    <line x1="500" y1="380" x2="500" y2="560"/>
    <line x1="200" y1="410" x2="200" y2="540"/>
    <line x1="600" y1="410" x2="600" y2="540"/>
  </g>

  <!-- Server rack 1 (left) -->
  <g transform="translate(180, 280)">
    <!-- Rack body -->
    <path d="M0,100 L50,-20 L130,-20 L80,100 Z" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M130,-20 L130,80 L80,200 L80,100 Z" fill="#0a1018" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M0,100 L80,100 L80,200 L0,200 Z" fill="#0f1a28" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Server units -->
    <rect x="5" y="108" width="70" height="12" fill="#111d2e" stroke="#22c55e" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="124" width="70" height="12" fill="#111d2e" stroke="#22c55e" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="140" width="70" height="12" fill="#111d2e" stroke="#4ade80" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="156" width="70" height="12" fill="#111d2e" stroke="#22c55e" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="172" width="70" height="12" fill="#111d2e" stroke="#10b981" stroke-width="0.5" opacity="0.8"/>
    <!-- Status LEDs -->
    <circle cx="12" cy="114" r="1.5" fill="#22c55e"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="130" r="1.5" fill="#22c55e"><animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="146" r="1.5" fill="#4ade80"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="162" r="1.5" fill="#22c55e"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="178" r="1.5" fill="#10b981"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Server rack 2 (center) -->
  <g transform="translate(340, 250)">
    <path d="M0,100 L50,-20 L130,-20 L80,100 Z" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M130,-20 L130,80 L80,200 L80,100 Z" fill="#0a1018" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M0,100 L80,100 L80,200 L0,200 Z" fill="#0f1a28" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="5" y="108" width="70" height="12" fill="#111d2e" stroke="#6366f1" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="124" width="70" height="12" fill="#111d2e" stroke="#6366f1" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="140" width="70" height="12" fill="#111d2e" stroke="#818cf8" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="156" width="70" height="12" fill="#111d2e" stroke="#6366f1" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="172" width="70" height="12" fill="#111d2e" stroke="#a5b4fc" stroke-width="0.5" opacity="0.8"/>
    <circle cx="12" cy="114" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="130" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="146" r="1.5" fill="#818cf8"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="162" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="178" r="1.5" fill="#a5b4fc"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Server rack 3 (right) -->
  <g transform="translate(500, 280)">
    <path d="M0,100 L50,-20 L130,-20 L80,100 Z" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M130,-20 L130,80 L80,200 L80,100 Z" fill="#0a1018" stroke="#1e3a5f" stroke-width="1"/>
    <path d="M0,100 L80,100 L80,200 L0,200 Z" fill="#0f1a28" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="5" y="108" width="70" height="12" fill="#111d2e" stroke="#f472b6" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="124" width="70" height="12" fill="#111d2e" stroke="#f472b6" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="140" width="70" height="12" fill="#111d2e" stroke="#fb7185" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="156" width="70" height="12" fill="#111d2e" stroke="#f472b6" stroke-width="0.5" opacity="0.8"/>
    <rect x="5" y="172" width="70" height="12" fill="#111d2e" stroke="#fda4af" stroke-width="0.5" opacity="0.8"/>
    <circle cx="12" cy="114" r="1.5" fill="#f472b6"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="130" r="1.5" fill="#f472b6"><animate attributeName="opacity" values="1;0.5;1" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="146" r="1.5" fill="#fb7185"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="162" r="1.5" fill="#f472b6"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite"/></circle>
    <circle cx="12" cy="178" r="1.5" fill="#fda4af"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Data flow lines between racks -->
  <g filter="url(#neonGlow)" opacity="0.7">
    <!-- Green to Purple -->
    <path d="M280,380 C310,360 340,355 360,370" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3">
      <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1s" repeatCount="indefinite"/>
    </path>
    <!-- Purple to Pink -->
    <path d="M460,370 C480,355 510,360 530,380" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3">
      <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <!-- Green to Pink (arc) -->
    <path d="M280,360 C350,280 450,280 530,360" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="3 4" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="14" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating data packets -->
  <g>
    <circle r="3" fill="#22c55e" filter="url(#neonGlow)" opacity="0.9">
      <animateMotion dur="2s" repeatCount="indefinite" path="M280,380 C310,360 340,355 360,370"/>
    </circle>
    <circle r="3" fill="#6366f1" filter="url(#neonGlow)" opacity="0.9">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M460,370 C480,355 510,360 530,380"/>
    </circle>
    <circle r="2.5" fill="#4ade80" filter="url(#neonGlow)" opacity="0.7">
      <animateMotion dur="3s" repeatCount="indefinite" path="M280,360 C350,280 450,280 530,360"/>
    </circle>
  </g>

  <!-- Ambient particles floating up -->
  <g fill="#22c55e" opacity="0.4">
    <circle cx="150" cy="200" r="1">
      <animate attributeName="cy" values="500;100" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="150" r="0.8">
      <animate attributeName="cy" values="500;80" dur="10s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="180" r="1.2">
      <animate attributeName="cy" values="500;60" dur="9s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="9s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="200" r="0.9">
      <animate attributeName="cy" values="500;90" dur="11s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="11s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="300" r="1.1">
      <animate attributeName="cy" values="500;120" dur="7s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="7s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="0.7">
      <animate attributeName="cy" values="500;70" dur="12s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="12s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Cloud/network nodes floating above -->
  <g filter="url(#neonGlow2)">
    <!-- Central hub -->
    <circle cx="400" cy="120" r="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="18;22;18" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="120" r="8" fill="#22c55e" opacity="0.3"/>
    <circle cx="400" cy="120" r="3" fill="#22c55e" opacity="0.8"/>
    
    <!-- Left node -->
    <circle cx="250" cy="160" r="12" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <circle cx="250" cy="160" r="4" fill="#4ade80" opacity="0.6"/>
    
    <!-- Right node -->
    <circle cx="550" cy="160" r="12" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <circle cx="550" cy="160" r="4" fill="#818cf8" opacity="0.6"/>
  </g>

  <!-- Connections from cloud to racks -->
  <g stroke="#22c55e" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 5">
    <line x1="250" y1="172" x2="230" y2="300">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="140" x2="390" y2="270">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="172" x2="560" y2="300">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <!-- Hub connections -->
    <line x1="270" y1="155" x2="380" y2="125" stroke="#4ade80"/>
    <line x1="530" y1="155" x2="420" y2="125" stroke="#818cf8"/>
  </g>

  <!-- Title and info -->
  <text x="400" y="38" font-family="ui-monospace, monospace" font-size="14" fill="#e8f5ec" text-anchor="middle" letter-spacing="2" opacity="0.9">CLOUD DATA CENTER</text>
  <text x="400" y="56" font-family="ui-monospace, monospace" font-size="9" fill="#6b8a74" text-anchor="middle" letter-spacing="1">ISOMETRIC · ANIMATED · PURE SVG · NO RUNTIME</text>

  <!-- Bottom stats -->
  <g font-family="ui-monospace, monospace" font-size="9">
    <rect x="250" y="565" width="300" height="22" fill="none" stroke="#1e3a5f" stroke-width="0.8" rx="3"/>
    <text x="400" y="580" fill="#6b8a74" text-anchor="middle">3 racks · 15 servers · 6 data flows · ~2,400 tokens · $0.001</text>
  </g>
</svg>
